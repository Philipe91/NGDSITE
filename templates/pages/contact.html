{% extends 'base.html' %}

{% block title %}Contato - NGD Site{% endblock %}

{% block content %}
<div class="container mx-auto px-4 lg:px-8 py-16 max-w-4xl pt-24">
    <div class="text-center mb-16">
        <h1 class="text-4xl font-black text-gray-900 tracking-tight">Fale Conosco</h1>
        <p class="text-gray-500 mt-4 text-lg">Nosso time de consultores visuais está pronto para atender você.</p>
    </div>

    <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-[0_20px_60px_rgba(0,0,0,0.05)]">
        <form action="" method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Nome Completo
                        *</label>
                    <input type="text" required
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors bg-gray-50 hover:bg-white focus:bg-white text-gray-900">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Email Corporativo
                        *</label>
                    <input type="email" required
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors bg-gray-50 hover:bg-white focus:bg-white text-gray-900">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Telefone /
                    WhatsApp</label>
                <input type="tel"
                    class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors bg-gray-50 hover:bg-white focus:bg-white text-gray-900">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider">Como podemos ajudar?
                    *</label>
                <textarea rows="5" required
                    class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors bg-gray-50 hover:bg-white focus:bg-white text-gray-900 resize-none"></textarea>
            </div>

            <button type="submit"
                class="bg-black hover:bg-gray-800 text-white w-full rounded-xl py-4 font-bold uppercase tracking-widest transition-colors duration-300">Enviar
                Mensagem</button>
        </form>
    </div>
</div>
{% endblock %}
