{% extends 'base.html' %}

{% block title %}Meus Pedidos - NGD Site{% endblock %}

{% block content %}
<div class="bg-surface border-b border-gray-100 py-10">
    <div class="container mx-auto px-4 lg:px-8 flex items-center justify-between">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Meus Pedidos</h1>
    </div>
</div>

<div class="container mx-auto px-4 lg:px-8 py-16">
    <div class="grid lg:grid-cols-[250px_1fr] gap-12">
        <div class="space-y-2">
            <a href="{% url 'customers:dashboard' %}"
                class="block px-6 py-4 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">Painel
                Geral</a>
            <a href="{% url 'customers:orders' %}"
                class="block px-6 py-4 rounded-xl bg-primary text-white font-bold transition-colors">Meus Pedidos &
                Artes</a>
            <a href="#"
                class="block px-6 py-4 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">Meus
                Dados</a>
        </div>

        <div>
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm">
                <!-- Tabela de Pedidos -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface border-b border-gray-200">
                                <th class="py-4 px-6 text-xs font-bold text-gray-500 uppercase tracking-wider">Pedido
                                </th>
                                <th class="py-4 px-6 text-xs font-bold text-gray-500 uppercase tracking-wider">Data</th>
                                <th class="py-4 px-6 text-xs font-bold text-gray-500 uppercase tracking-wider">Total
                                </th>
                                <th class="py-4 px-6 text-xs font-bold text-gray-500 uppercase tracking-wider">Status
                                    Financeiro</th>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">
                                    Ação</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="5" class="py-20 text-center text-gray-500 border-none">
                                    Nenhum pedido efetuado ainda.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
